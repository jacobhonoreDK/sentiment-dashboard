name: Opdater og deploy sentiment dashboard

on:
  schedule:
    - cron: '0 * * * *'  # Hver time
  push:
    branches: [main]
  workflow_dispatch:  # Kan køres manuelt fra GitHub

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Opsæt Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer afhængigheder
        run: pip install yfinance pandas numpy requests beautifulsoup4 openpyxl pytrends pynacl

      - name: Kør opdateringsscript
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GITHUB_ACTIONS_RUN: 'true'
        run: python update_dashboard.py

      - name: Gem opdateret data.js og cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js pcr_cache.json manual_cache.json || true
          git diff --staged --quiet || git commit -m "auto: opdater data.js $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Upload til GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy til GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
